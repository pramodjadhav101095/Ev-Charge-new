server:
  port: 8084

spring:
  application:
    name: slot-booking-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/booking_db?createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD:1qaz2wsx!@QW}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092   # ✅ FIXED

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: "bookingEvent:com.evcharge.booking.kafka.BookingEvent"

    consumer:
      group-id: slot-booking-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.evcharge.*"
        spring.json.type.mapping: "bookingEvent:com.evcharge.booking.kafka.BookingEvent,paymentEvent:com.evcharge.payment.event.PaymentEvent"

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-service}:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
    prometheus:
      enabled: true

metrics:
  export:
    prometheus:
      enabled: true

# Redisson config
redisson:
  address: redis://${REDIS_HOST:redis}:6379

# Booking config
booking:
  slot-duration-minutes: 60
  max-advance-days: 7
  operating-hours:
    start: 6
    end: 23

logging:
  level:
    com.evcharge.booking: DEBUG
